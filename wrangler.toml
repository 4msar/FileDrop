name = "file-drop"
main = "worker/index.js"
compatibility_date = "2026-06-08"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[durable_objects]
bindings = [
  { name = "ROOMS", class_name = "Room" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]

[observability.logs]
enabled = true
invocation_logs = true
